name: myapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.1+35

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  firebase_core: ^3.0.0
  firebase_analytics: ^11.0.0
  cloud_firestore: ^5.0.0
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^5.1.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  http: ^1.6.0
  in_app_purchase: ^3.2.3
  get_it: ^8.0.3
  flutter_markdown: ^0.7.7+1
  uuid: ^4.5.3
  pdf: ^3.10.0
  printing: ^5.12.0
  share_plus: ^7.0.0
  path_provider: ^2.1.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/data/
    - assets/images/
    - assets/fonts/
    - assets/test/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
